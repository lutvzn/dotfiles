---
- name: Ensure local users exist
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    managed_groups:
      - name: lutvzn
        gid: 1000
    lutvzn_git_config_path: "{{ home_root }}/lutvzn/.gitconfig"

  pre_tasks:
    - name: Check whether /var/home exists
      ansible.builtin.stat:
        path: /var/home
      register: var_home

    - name: Set the base home directory
      ansible.builtin.set_fact:
        home_root: "{{ '/var/home' if var_home.stat.exists else '/home' }}"

    - name: Check whether zsh is available
      ansible.builtin.shell: |
        set -o pipefail
        PATH="/home/linuxbrew/.linuxbrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/local/sbin:/usr/sbin:/sbin"
        command -v zsh
      args:
        executable: /bin/bash
      register: zsh_lookup
      changed_when: false
      failed_when: false

    - name: Select lutvzn login shell
      ansible.builtin.set_fact:
        lutvzn_shell: "{{ zsh_lookup.stdout | trim if zsh_lookup.rc == 0 else '/bin/bash' }}"

    - name: Ensure lutvzn zsh shell is registered as a valid login shell
      ansible.builtin.lineinfile:
        path: /etc/shells
        line: "{{ lutvzn_shell }}"
        create: true
        mode: "0644"
      when: lutvzn_shell != "/bin/bash"

    - name: Define managed users
      ansible.builtin.set_fact:
        managed_users:
          - name: lutvzn
            uid: 1000
            group: lutvzn
            groups: []
            home: "{{ home_root }}/lutvzn"
            shell: "{{ lutvzn_shell }}"

  tasks:
    - name: Disable lingering for removed deploy user when present
      ansible.builtin.command: loginctl disable-linger deploy
      args:
        removes: /var/lib/systemd/linger/deploy
      failed_when: false

    - name: Remove deploy user
      ansible.builtin.user:
        name: deploy
        state: absent

    - name: Remove deploy group
      ansible.builtin.group:
        name: deploy
        state: absent

    - name: Check whether /etc/subuid exists
      ansible.builtin.stat:
        path: /etc/subuid
      register: subuid_file

    - name: Remove subordinate UID mapping for deploy
      ansible.builtin.lineinfile:
        path: /etc/subuid
        regexp: '^deploy:'
        state: absent
      when: subuid_file.stat.exists

    - name: Check whether /etc/subgid exists
      ansible.builtin.stat:
        path: /etc/subgid
      register: subgid_file

    - name: Remove subordinate GID mapping for deploy
      ansible.builtin.lineinfile:
        path: /etc/subgid
        regexp: '^deploy:'
        state: absent
      when: subgid_file.stat.exists

    - name: Ensure groups exist
      ansible.builtin.group:
        name: "{{ item.name }}"
        gid: "{{ item.gid }}"
        state: present
      loop: "{{ managed_groups }}"

    - name: Ensure users exist
      ansible.builtin.user:
        name: "{{ item.name }}"
        uid: "{{ item.uid }}"
        group: "{{ item.group }}"
        groups: "{{ item.groups | join(',') }}"
        append: true
        create_home: true
        home: "{{ item.home }}"
        shell: "{{ item.shell }}"
        state: present
      loop: "{{ managed_users }}"

    - name: Ensure user home directories have the correct ownership and mode
      ansible.builtin.file:
        path: "{{ item.home }}"
        state: directory
        owner: "{{ item.name }}"
        group: "{{ item.group }}"
        mode: "0700"
      loop: "{{ managed_users }}"

    - name: Ensure Git config exists for lutvzn
      ansible.builtin.file:
        path: "{{ lutvzn_git_config_path }}"
        state: touch
        owner: lutvzn
        group: lutvzn
        mode: "0600"

    - name: Set Git username for lutvzn
      ansible.builtin.ini_file:
        path: "{{ lutvzn_git_config_path }}"
        section: user
        option: name
        value: lutvzn
        owner: lutvzn
        group: lutvzn
        mode: "0600"

    - name: Set Git email for lutvzn
      ansible.builtin.ini_file:
        path: "{{ lutvzn_git_config_path }}"
        section: user
        option: email
        value: 106083845+lutvzn@users.noreply.github.com
        owner: lutvzn
        group: lutvzn
        mode: "0600"
